<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Connections (lines from center to outer nodes) -->
  <line x1="50" y1="50" x2="50" y2="22" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="76" y2="33" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="72" y2="68" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="28" y2="68" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="24" y2="33" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="50" cy="22" r="5" fill="#60A5FA"/>
  <circle cx="76" cy="33" r="4" fill="#E5E7EB"/>
  <circle cx="72" cy="68" r="4.5" fill="#60A5FA"/>
  <circle cx="28" cy="68" r="4" fill="#E5E7EB"/>
  <circle cx="24" cy="33" r="3.5" fill="#E5E7EB"/>

  <!-- Central node (core) -->
  <circle cx="50" cy="50" r="7" fill="#FFFFFF"/>
</svg>
