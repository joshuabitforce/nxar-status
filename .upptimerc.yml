# Informaci?n de la organizaci?n
owner: joshuabitforce
repo: upptime    # o el nombre que hayas usado

# Sites a monitorear
sites:
  - name: Admin App
    url: https://admin.nx-ar.com/api/health
    expectedStatusCodes: [200]
    body: '"status":"ok"'

  - name: Master Database
    url: https://admin.nx-ar.com/api/health
    expectedStatusCodes: [200]
    body: '"db":"ok"'

  # Dejá comentado hasta que docs este deployado
  # - name: Documentation
  #   url: https://docs.nx-ar.com
  #   expectedStatusCodes: [200]

# Status page
status-website:
  cname: status.nx-ar.com
  logoUrl: https://nx-ar.com/logo.svg   # opcional, si tenés
  name: Nxar Status
  introTitle: '**Status de Nxar**'
  introMessage: 'Estado de disponibilidad en tiempo real.'
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/joshuabitforce/upptime

# Notificaciones via GitHub Issues (siempre activo, sumás más en tu settings)
assignees:
  - joshuabitforce

# Opcional: Slack / Discord / Telegram via secrets (m?s adelante)

# Configuraci?n del workflow
workflowSchedule:
  graphs: '0 0 * * *'    # diario
  responseTime: '0 23 * * *'  # diario
  staticSite: '*/10 * * * *'  # cada 10 min
  summary: '0 1 * * *'   # diario
  updateTemplate: '0 3 * * 0'  # semanal
  updates: '0 3 * * *'   # diario
  uptime: '*/5 * * * *'  # cada 5 min (esto controla la frecuencia de los checks)
